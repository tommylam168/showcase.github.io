        var weekday = ["Mon", "Tue", "Wed", "Thu", "Fri","Sat","Sun","Weekday"];
        d3.range(0,11,1).forEach(function(d){period.push([1,1,d+1,d+1]);});
        period.push([1,1,12,"Period"]);
            for (let i = 0; i < weekday.length; i++) {
                weekday2.push([i+0.5,0.5,0.5,weekday[i]]);
            }
 
            var data = [
            grid3d(xGrid),
            point3d(scatter),
            yScale3d([yLine]),
            zScale3d([weekday2]),
            xScale3d([period])
        ];

        // 1000 refers to the lagging of process data
        processData(data, 0);
    }


    // States with the mouse position when doing left click 
    function dragStart(){
        mx = d3.event.x;
        my = d3.event.y;
    }
    // Calculate the difference between the mouse position when doing left click
    function dragged(){;
        mouseX = mouseX || 0;
        mouseY = mouseY || 0;
        //Mouse move to right, then beta will increase
        //Mouse move to above, then alpha will increase
        beta   = (d3.event.x - mx + mouseX) * Math.PI / 230 *-1;
        //beta refers for the rotation along the y-axis, d3.event.x - mx + mouseX is the angle between the starting point (fixed) and the current point, Math.PI / 230 refers to the velocity of the rotation, mouseX refers to the last stopping location of the mouse
        alpha  = (d3.event.y - my + mouseY) * Math.PI / 230  ;
        //alpha refers for the rotation along the x-axis
        var data = [
            grid3d.rotateY(beta + startAngle).rotateX(alpha - startAngle)(xGrid),
            point3d.rotateY(beta + startAngle).rotateX(alpha - startAngle)(scatter),
            yScale3d.rotateY(beta + startAngle).rotateX(alpha - startAngle)([yLine]),
            xScale3d.rotateY(beta + startAngle).rotateX(alpha - startAngle)([weekday2]),
            zScale3d.rotateY(beta + startAngle).rotateX(alpha - startAngle)([period]),
        ];
        processData(data, 0);

    }
    // return the cuurrent coordinate of mouseX and mouseY when stop dragging
    function dragEnd(){
        mouseX = d3.event.x - mx + mouseX;
        mouseY = d3.event.y - my + mouseY;
    }

    d3.selectAll('button').on('click', init);

    init();
</script>
</body>
