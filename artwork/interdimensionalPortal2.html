<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inter-Dimensional Portal</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #wrap {
      position: fixed;
      inset: 0;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #bloom {
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 100%),
        radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.9) 100%);
    }

    .film-grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="main"></canvas>
    <canvas id="bloom"></canvas>
  </div>
  <div class="vignette"></div>
  <div class="film-grain"></div>

  <script>
    const main = document.getElementById('main');
    const bloom = document.getElementById('bloom');
    const ctx = main.getContext('2d');
    const bctx = bloom.getContext('2d');
    const DPR = Math.min(devicePixelRatio || 1, 2);

    let W, H, cx, cy, R;
    function resize() {
      W = innerWidth; H = innerHeight;
      for (const c of [main, bloom]) {
        c.width = W * DPR; c.height = H * DPR;
        c.style.width = W + 'px'; c.style.height = H + 'px';
      }
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      bctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      cx = W / 2; cy = H / 2;
      R = Math.min(W, H) * 0.19;
    }
    addEventListener('resize', resize);
    resize();

    // ── Animation timeline ─────────────────────────────────
    const T = { IGNITE: 0.5, CAST: 2.8, SEAL: 0.5 };
    let t0 = null, last = 0, sealed = false;

    function elapsed() { return (performance.now() - t0) / 1000; }

    function phase(t) {
      if (t < T.IGNITE) return { name: 'ignite', p: t / T.IGNITE };
      t -= T.IGNITE;
      if (t < T.CAST) return { name: 'cast', p: t / T.CAST };
      t -= T.CAST;
      if (t < T.SEAL) return { name: 'seal', p: t / T.SEAL };
      return { name: 'open', p: 1 };
    }

    const easeOut = t => 1 - (1 - t) ** 3;
    const easeInOut = t => t < 0.5 ? 4 * t ** 3 : 1 - (-2 * t + 2) ** 3 / 2;

    // ── Background ─────────────────────────────────────────
    const dust = Array.from({ length: 120 }, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.2 + 0.2,
      sp: Math.random() * 6 + 2,
      ph: Math.random() * Math.PI * 2
    }));

    const motes = Array.from({ length: 30 }, () => ({
      ang: Math.random() * Math.PI * 2,
      dist: 0.5 + Math.random() * 2.5,
      sp: (Math.random() - 0.5) * 0.3,
      sz: Math.random() * 1.5 + 0.5,
      ph: Math.random() * Math.PI * 2
    }));

    function drawBackground(time, portalGlow) {
      ctx.fillStyle = '#020104';
      ctx.fillRect(0, 0, W, H);

      // Deep space gradient
      const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.7);
      bg.addColorStop(0, `rgba(18,6,28,${0.4 + portalGlow * 0.15})`);
      bg.addColorStop(0.4, 'rgba(8,3,12,0.6)');
      bg.addColorStop(1, '#020104');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // Portal ambient light on background
      if (portalGlow > 0) {
        const amb = ctx.createRadialGradient(cx, cy, R * 0.5, cx, cy, R * 3.5);
        amb.addColorStop(0, `rgba(255,120,20,${portalGlow * 0.12})`);
        amb.addColorStop(0.4, `rgba(255,80,0,${portalGlow * 0.04})`);
        amb.addColorStop(1, 'rgba(255,60,0,0)');
        ctx.fillStyle = amb;
        ctx.fillRect(0, 0, W, H);
      }

      // Stars
      for (const s of dust) {
        const tw = 0.15 + 0.35 * Math.sin(time * s.sp * 0.3 + s.ph);
        ctx.fillStyle = `rgba(180,170,200,${tw})`;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fill();
      }

      // Floating motes drifting toward portal
      for (const m of motes) {
        m.ang += m.sp * 0.008;
        const d = m.dist * R * (0.8 + 0.2 * Math.sin(time + m.ph));
        const x = cx + Math.cos(m.ang + time * 0.05) * d * 2.5;
        const y = cy + Math.sin(m.ang + time * 0.05) * d * 2.5;
        const a = 0.1 + 0.15 * Math.sin(time * 2 + m.ph);
        ctx.fillStyle = `rgba(255,160,60,${a * portalGlow})`;
        ctx.beginPath();
        ctx.arc(x, y, m.sz, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ── Ring spark particles (the fiery portal edge) ───────
    class RingSpark {
      constructor(angle, birth = 0) {
        this.angle = angle;
        this.birth = birth;
        this.radOff = (Math.random() - 0.5) * 18;
        this.orbitSpd = (Math.random() - 0.5) * 2.5;
        this.life = 0.4 + Math.random() * 0.6;
        this.maxLife = this.life;
        this.size = Math.random() * 2.5 + 0.8;
        this.bright = 0.6 + Math.random() * 0.4;
        this.hue = 18 + Math.random() * 35;
        // Tangential drift (swirl)
        this.vx = (Math.random() - 0.5) * 60;
        this.vy = (Math.random() - 0.5) * 60;
        this.x = 0; this.y = 0;
      }

      update(dt, ringR, arcLimit, time) {
        this.angle += this.orbitSpd * dt;
        // Keep within drawn arc during cast
        if (arcLimit < Math.PI * 2 - 0.01) {
          const rel = ((this.angle + Math.PI / 2) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
          if (rel > arcLimit) this.life -= dt * 3;
        }
        const r = ringR + this.radOff + Math.sin(time * 8 + this.angle * 5) * 3;
        this.x = cx + Math.cos(this.angle) * r + this.vx * dt * 0.3;
        this.y = cy + Math.sin(this.angle) * r + this.vy * dt * 0.3;
        this.vx *= 1 - dt * 1.5;
        this.vy *= 1 - dt * 1.5;
        this.life -= dt * (0.25 + Math.random() * 0.15);
        this.radOff += (Math.random() - 0.5) * dt * 40;
      }

      draw(target, alpha) {
        if (this.life <= 0) return;
        const a = (this.life / this.maxLife) * alpha * this.bright;
        const x = this.x, y = this.y, s = this.size;

        // Streak
        const c = ctx;
        c.save();
        c.globalAlpha = a * 0.5;
        c.strokeStyle = `hsla(${this.hue},100%,70%,${a})`;
        c.lineWidth = s * 0.4;
        c.beginPath();
        c.moveTo(x, y);
        c.lineTo(x - Math.cos(this.angle) * s * 3, y - Math.sin(this.angle) * s * 3);
        c.stroke();
        c.restore();

        // Core dot on bloom layer
        const g = target.createRadialGradient(x, y, 0, x, y, s * 4);
        g.addColorStop(0, `rgba(255,255,210,${a})`);
        g.addColorStop(0.2, `rgba(255,200,60,${a * 0.8})`);
        g.addColorStop(0.5, `rgba(255,120,10,${a * 0.4})`);
        g.addColorStop(1, 'rgba(255,80,0,0)');
        target.fillStyle = g;
        target.beginPath();
        target.arc(x, y, s * 4, 0, Math.PI * 2);
        target.fill();
      }
    }

    const ringSparks = [];

    function spawnRingSparks(count, arcEnd, ringR) {
      for (let i = 0; i < count; i++) {
        const a = -Math.PI / 2 + Math.random() * arcEnd;
        ringSparks.push(new RingSpark(a));
      }
    }

    // ── Flyaway embers ─────────────────────────────────────
    class FlyEmber {
      constructor(angle, ringR, power = 1) {
        const r = ringR + (Math.random() - 0.5) * 10;
        this.x = cx + Math.cos(angle) * r;
        this.y = cy + Math.sin(angle) * r;
        const spd = (80 + Math.random() * 200) * power;
        const spread = (Math.random() - 0.5) * 1.2;
        this.vx = Math.cos(angle + spread) * spd;
        this.vy = Math.sin(angle + spread) * spd;
        this.life = 1;
        this.sz = Math.random() * 2 + 0.5;
      }
      update(dt) {
        this.x += this.vx * dt; this.y += this.vy * dt;
        this.vx *= 1 - dt * 1.8; this.vy *= 1 - dt * 1.8;
        this.life -= dt * (0.6 + Math.random() * 0.4);
      }
      draw(target) {
        if (this.life <= 0) return;
        target.fillStyle = `rgba(255,${140 + Math.random() * 60 | 0},30,${this.life * 0.9})`;
        target.beginPath();
        target.arc(this.x, this.y, this.sz, 0, Math.PI * 2);
        target.fill();
      }
    }
    const flyEmbers = [];

    // ── Arcane symbol paths (MCU-style sacred geometry) ──
    function drawArcaneSymbol(x, y, rot, scale, alpha, variant) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.scale(scale, scale);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = `rgba(255,${190 + variant * 20},${40 + variant * 15},${alpha})`;
      ctx.lineWidth = 1.1;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = 'rgba(255,140,0,0.9)';
      ctx.shadowBlur = 8;

      const s = 10;
      ctx.beginPath();
      switch (variant % 6) {
        case 0: // Circle + cross + inner diamond
          ctx.arc(0, 0, s, 0, Math.PI * 2);
          ctx.moveTo(-s, 0); ctx.lineTo(s, 0);
          ctx.moveTo(0, -s); ctx.lineTo(0, s);
          ctx.moveTo(0, -s * 0.5); ctx.lineTo(s * 0.5, 0);
          ctx.lineTo(0, s * 0.5); ctx.lineTo(-s * 0.5, 0); ctx.closePath();
          break;
        case 1: // Triangle in circle
          ctx.arc(0, 0, s, 0, Math.PI * 2);
          ctx.moveTo(0, -s * 0.75);
          ctx.lineTo(s * 0.65, s * 0.55);
          ctx.lineTo(-s * 0.65, s * 0.55); ctx.closePath();
          break;
        case 2: // Square rotated + corner ticks
          ctx.moveTo(-s * 0.6, -s * 0.6); ctx.lineTo(s * 0.6, -s * 0.6);
          ctx.lineTo(s * 0.6, s * 0.6); ctx.lineTo(-s * 0.6, s * 0.6); ctx.closePath();
          ctx.moveTo(0, -s); ctx.lineTo(0, -s * 0.6);
          ctx.moveTo(0, s); ctx.lineTo(0, s * 0.6);
          ctx.moveTo(-s, 0); ctx.lineTo(-s * 0.6, 0);
          ctx.moveTo(s, 0); ctx.lineTo(s * 0.6, 0);
          break;
        case 3: // Three-arc fan
          for (let i = 0; i < 3; i++) {
            const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, s, a - 0.4, a + 0.4);
          }
          ctx.moveTo(0, 0); ctx.arc(0, 0, s * 0.35, 0, Math.PI * 2);
          break;
        case 4: // Hourglass / rune
          ctx.moveTo(-s * 0.5, -s); ctx.lineTo(s * 0.5, -s);
          ctx.lineTo(-s * 0.5, s); ctx.lineTo(s * 0.5, s);
          ctx.moveTo(-s * 0.5, -s); ctx.lineTo(s * 0.5, s);
          ctx.moveTo(s * 0.5, -s); ctx.lineTo(-s * 0.5, s);
          ctx.moveTo(0, -s); ctx.lineTo(0, s);
          break;
        case 5: // Hex knot
          for (let i = 0; i < 6; i++) {
            const a1 = (i / 6) * Math.PI * 2;
            const a2 = ((i + 2) / 6) * Math.PI * 2;
            ctx.moveTo(Math.cos(a1) * s * 0.8, Math.sin(a1) * s * 0.8);
            ctx.lineTo(Math.cos(a2) * s * 0.8, Math.sin(a2) * s * 0.8);
          }
          ctx.moveTo(0, 0); ctx.arc(0, 0, s * 0.25, 0, Math.PI * 2);
          break;
      }
      ctx.stroke();
      ctx.restore();
    }

    // Outer rune ring + inner mandala ring
    function drawRuneRings(openness, time, arcEnd) {
      if (openness <= 0) return;

      const symAlpha = Math.min(1, openness * 1.2);
      const outerCount = 16;
      const innerCount = 12;
      const outerRot = time * 0.25;
      const innerRot = -time * 0.45;

      // Outer ring of arcane symbols
      for (let i = 0; i < outerCount; i++) {
        const baseAng = outerRot + (i / outerCount) * Math.PI * 2;
        if (arcEnd < Math.PI * 2 - 0.01) {
          const rel = ((baseAng + Math.PI / 2) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
          if (rel > arcEnd) continue;
        }
        const pulse = 0.65 + 0.35 * Math.sin(time * 3.5 + i * 2.1);
        const dist = R + 34 + Math.sin(time * 2 + i) * 2;
        drawArcaneSymbol(
          cx + Math.cos(baseAng) * dist,
          cy + Math.sin(baseAng) * dist,
          baseAng + Math.PI / 2,
          0.9 + pulse * 0.15,
          symAlpha * pulse * 0.9,
          i
        );
      }

      // Inner mandala ring
      if (openness > 0.4) {
        const innerAlpha = symAlpha * Math.min(1, (openness - 0.4) / 0.6) * 0.7;
        for (let i = 0; i < innerCount; i++) {
          const baseAng = innerRot + (i / innerCount) * Math.PI * 2;
          const dist = R * 0.78;
          const pulse = 0.5 + 0.5 * Math.sin(time * 4 + i * 1.5);
          drawArcaneSymbol(
            cx + Math.cos(baseAng) * dist,
            cy + Math.sin(baseAng) * dist,
            baseAng,
            0.65 + pulse * 0.1,
            innerAlpha * pulse,
            i + 3
          );
        }
      }

      // Connecting arc segments between outer symbols
      if (openness > 0.5) {
        ctx.save();
        ctx.globalAlpha = symAlpha * 0.35;
        ctx.strokeStyle = 'rgba(255,160,40,0.6)';
        ctx.lineWidth = 0.8;
        ctx.shadowColor = 'rgba(255,120,0,0.5)';
        ctx.shadowBlur = 6;
        const segR = R + 34;
        ctx.beginPath();
        const segs = 64;
        for (let i = 0; i <= segs; i++) {
          const ang = outerRot + (i / segs) * Math.PI * 2;
          if (arcEnd < Math.PI * 2 - 0.01) {
            const rel = ((ang + Math.PI / 2) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
            if (rel > arcEnd) continue;
          }
          const wob = Math.sin(ang * 8 + time * 2) * 3;
          const px = cx + Math.cos(ang) * (segR + wob);
          const py = cy + Math.sin(ang) * (segR + wob);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.restore();
      }
    }

    // ── Portal interior (dimensional window) ─────────────
    function drawPortalInterior(openness, time) {
      if (openness <= 0) return;
      const ir = R * 0.88 * openness;

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, ir, 0, Math.PI * 2);
      ctx.clip();

      // Event horizon gradient
      const hole = ctx.createRadialGradient(cx, cy, 0, cx, cy, ir);
      hole.addColorStop(0, '#0a0618');
      hole.addColorStop(0.35, '#120820');
      hole.addColorStop(0.7, '#08040f');
      hole.addColorStop(0.92, '#1a0800');
      hole.addColorStop(1, '#2a1000');
      ctx.fillStyle = hole;
      ctx.fillRect(cx - ir, cy - ir, ir * 2, ir * 2);

      // Swirling dimensional energy
      for (let layer = 0; layer < 6; layer++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(time * (0.15 + layer * 0.06) * (layer % 2 ? -1 : 1));
        const lr = ir * (0.25 + layer * 0.12);
        ctx.scale(lr / ir, lr / ir * 0.6);

        const eg = ctx.createLinearGradient(-ir, 0, ir, 0);
        const ea = openness * (0.06 + layer * 0.02);
        eg.addColorStop(0, 'rgba(255,80,0,0)');
        eg.addColorStop(0.35, `rgba(255,${100 + layer * 15},0,${ea})`);
        eg.addColorStop(0.5, `rgba(255,200,80,${ea * 1.5})`);
        eg.addColorStop(0.65, `rgba(180,40,255,${ea * 0.6})`);
        eg.addColorStop(1, 'rgba(80,0,160,0)');
        ctx.fillStyle = eg;
        ctx.fillRect(-ir, -ir * 0.08, ir * 2, ir * 0.16);
        ctx.restore();
      }

      // Shimmer points inside rift
      for (let i = 0; i < 25; i++) {
        const sa = i * 2.39996 + time * 0.08;
        const sd = ((i * 13.7) % 100 / 100) * ir * 0.9;
        const sx = cx + Math.cos(sa) * sd;
        const sy = cy + Math.sin(sa) * sd;
        const ba = openness * (0.2 + 0.5 * Math.sin(time * 3 + i));
        ctx.fillStyle = `rgba(255,200,120,${ba * 0.5})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 0.6 + (i % 3) * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();

      // Orange rim bleed into interior edge
      const rim = ctx.createRadialGradient(cx, cy, ir * 0.75, cx, cy, ir);
      rim.addColorStop(0, 'rgba(255,100,0,0)');
      rim.addColorStop(0.6, `rgba(255,120,20,${openness * 0.15})`);
      rim.addColorStop(1, `rgba(255,180,50,${openness * 0.35})`);
      ctx.fillStyle = rim;
      ctx.beginPath();
      ctx.arc(cx, cy, ir, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── Fiery ring glow (bloom layer) ──────────────────────
    function drawRingGlow(arcEnd, intensity, time) {
      if (arcEnd <= 0 || intensity <= 0) return;
      const start = -Math.PI / 2;

      // Thick soft glow ring
      for (let pass = 0; pass < 3; pass++) {
        bctx.save();
        bctx.globalAlpha = intensity * (0.15 - pass * 0.04);
        bctx.strokeStyle = pass === 0 ? 'rgba(255,200,80,1)' : 'rgba(255,120,20,1)';
        bctx.lineWidth = 28 - pass * 8;
        bctx.lineCap = 'round';
        bctx.shadowColor = 'rgba(255,150,0,1)';
        bctx.shadowBlur = 40 - pass * 10;
        bctx.beginPath();
        bctx.arc(cx, cy, R + Math.sin(time * 4) * 2, start, start + arcEnd);
        bctx.stroke();
        bctx.restore();
      }

      // Leading spark tip while casting
      if (arcEnd < Math.PI * 2 - 0.05) {
        const tip = start + arcEnd;
        const tx = cx + Math.cos(tip) * R;
        const ty = cy + Math.sin(tip) * R;
        const tg = bctx.createRadialGradient(tx, ty, 0, tx, ty, 50);
        tg.addColorStop(0, `rgba(255,255,230,${intensity})`);
        tg.addColorStop(0.2, `rgba(255,200,60,${intensity * 0.7})`);
        tg.addColorStop(1, 'rgba(255,100,0,0)');
        bctx.fillStyle = tg;
        bctx.beginPath();
        bctx.arc(tx, ty, 50, 0, Math.PI * 2);
        bctx.fill();
      }
    }

    // ── Center ignition spark ──────────────────────────────
    function drawIgnition(p) {
      const sz = 2 + p * 12;
      const a = Math.min(1, p * 1.8);
      const g = bctx.createRadialGradient(cx, cy, 0, cx, cy, sz * 5);
      g.addColorStop(0, `rgba(255,255,240,${a})`);
      g.addColorStop(0.15, `rgba(255,210,80,${a * 0.9})`);
      g.addColorStop(0.4, `rgba(255,120,0,${a * 0.4})`);
      g.addColorStop(1, 'rgba(255,60,0,0)');
      bctx.fillStyle = g;
      bctx.beginPath();
      bctx.arc(cx, cy, sz * 5, 0, Math.PI * 2);
      bctx.fill();
    }

    // ── Mandala frame (outer decorative circle) ────────────
    function drawMandalaFrame(openness, time, arcEnd) {
      if (openness < 0.3) return;
      const a = Math.min(1, (openness - 0.3) / 0.7) * 0.5;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.strokeStyle = 'rgba(255,150,50,0.5)';
      ctx.lineWidth = 0.6;
      ctx.shadowColor = 'rgba(255,120,0,0.6)';
      ctx.shadowBlur = 4;

      const rings = [R + 48, R + 52];
      for (const rr of rings) {
        ctx.beginPath();
        ctx.setLineDash([4, 8]);
        ctx.lineDashOffset = time * 20;
        if (arcEnd >= Math.PI * 2 - 0.01) {
          ctx.arc(cx, cy, rr, 0, Math.PI * 2);
        } else {
          ctx.arc(cx, cy, rr, -Math.PI / 2, -Math.PI / 2 + arcEnd);
        }
        ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.restore();
    }

    // ── Main loop ──────────────────────────────────────────
    let sealBurst = false;

    function frame(now) {
      if (!t0) t0 = now;
      const dt = Math.min((now - last) / 1000, 0.033);
      last = now;

      const t = elapsed();
      const { name, p } = phase(t);

      let arcEnd = 0, openness = 0, intensity = 0, portalGlow = 0;

      if (name === 'ignite') {
        portalGlow = p * 0.3;
        intensity = p * 0.5;
      } else if (name === 'cast') {
        const ep = easeInOut(p);
        arcEnd = ep * Math.PI * 2;
        openness = ep * 0.9;
        intensity = 0.5 + ep * 0.5;
        portalGlow = 0.3 + ep * 0.7;

        // Dense sparks at leading edge
        const rate = Math.floor(8 + ep * 20);
        spawnRingSparks(rate, arcEnd, R);
        // Fill existing arc with ambient sparks
        if (Math.random() < 0.6) spawnRingSparks(2, arcEnd, R);
      } else if (name === 'seal') {
        arcEnd = Math.PI * 2;
        openness = 0.9 + easeOut(p) * 0.1;
        intensity = 1;
        portalGlow = 1;

        if (!sealBurst) {
          sealBurst = true;
          for (let i = 0; i < 120; i++) {
            flyEmbers.push(new FlyEmber((i / 120) * Math.PI * 2, R, 1.5));
          }
          spawnRingSparks(200, Math.PI * 2, R);
        }
        spawnRingSparks(12, Math.PI * 2, R);
      } else {
        arcEnd = Math.PI * 2;
        openness = 1;
        intensity = 0.85 + 0.15 * Math.sin(t * 3);
        portalGlow = 0.9 + 0.1 * Math.sin(t * 2);
        if (Math.random() < 0.7) spawnRingSparks(6, Math.PI * 2, R);
      }

      // Clear
      ctx.clearRect(0, 0, W, H);
      bctx.clearRect(0, 0, W, H);

      drawBackground(t, portalGlow);
      drawPortalInterior(openness, t);
      drawMandalaFrame(openness, t, arcEnd);
      drawRuneRings(openness, t, arcEnd);
      drawRingGlow(arcEnd, intensity, t);

      if (name === 'ignite') drawIgnition(p);

      // Update & render sparks
      const sparkAlpha = name === 'ignite' ? p : intensity;
      for (let i = ringSparks.length - 1; i >= 0; i--) {
        ringSparks[i].update(dt, R, arcEnd, t);
        ringSparks[i].draw(bctx, sparkAlpha);
        if (ringSparks[i].life <= 0) ringSparks.splice(i, 1);
      }
      while (ringSparks.length > 600) ringSparks.shift();

      for (let i = flyEmbers.length - 1; i >= 0; i--) {
        flyEmbers[i].update(dt);
        flyEmbers[i].draw(bctx);
        if (flyEmbers[i].life <= 0) flyEmbers.splice(i, 1);
      }

      // Apply bloom blur via CSS filter on bloom canvas
      bloom.style.filter = `blur(${8 + intensity * 6}px)`;

      requestAnimationFrame(frame);
    }

    // Replay
    main.addEventListener('click', () => {
      t0 = null; last = 0; sealBurst = false;
      ringSparks.length = 0; flyEmbers.length = 0;
    });

    requestAnimationFrame(frame);
  </script>
</body>
</html>
