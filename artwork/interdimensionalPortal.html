<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inter-Dimensional Portal</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030008;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.75) 100%);
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="vignette"></div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { alpha: false });

    let W, H, cx, cy, radius;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      cx = W / 2;
      cy = H / 2;
      radius = Math.min(W, H) * 0.22;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Timing ──────────────────────────────────────────────
    const T = {
      SPARK:     0.4,   // single point appears
      DRAW:      3.2,   // arc sweeps to full circle
      BURST:     0.6,   // completion burst
      STABLE:    Infinity
    };
    const TOTAL_OPEN = T.SPARK + T.DRAW + T.BURST;

    let startTime = null;

    function elapsed() {
      return (performance.now() - startTime) / 1000;
    }

    function phaseProgress(t) {
      if (t < T.SPARK) return { phase: 'spark', p: t / T.SPARK };
      t -= T.SPARK;
      if (t < T.DRAW) return { phase: 'draw', p: t / T.DRAW };
      t -= T.DRAW;
      if (t < T.BURST) return { phase: 'burst', p: t / T.BURST };
      return { phase: 'stable', p: 1 };
    }

    // ── Eldritch-glyphs (MCU-style geometric runes) ────────
    const GLYPHS = '◈◇◆⬡⬢✦✧☉⊕⊗⊙◉'.split('');

    // ── Background stars ───────────────────────────────────
    const stars = Array.from({ length: 180 }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.4 + 0.3,
      a: Math.random() * 0.6 + 0.2,
      tw: Math.random() * Math.PI * 2
    }));

    // ── Spark particles along the ring ─────────────────────
    class Spark {
      constructor(angle, speed = 1) {
        this.angle = angle;
        this.life = 1;
        this.speed = speed;
        this.offset = (Math.random() - 0.5) * 14;
        this.size = Math.random() * 3 + 1;
        this.hue = 25 + Math.random() * 30;
      }
      update(dt) {
        this.angle += dt * (2.5 + this.speed) * (Math.random() > 0.5 ? 1 : -1) * 0.02;
        this.life -= dt * (0.4 + Math.random() * 0.3);
        this.offset += (Math.random() - 0.5) * dt * 30;
      }
      draw(r, alpha) {
        if (this.life <= 0) return;
        const a = this.angle;
        const dist = r + this.offset;
        const x = cx + Math.cos(a) * dist;
        const y = cy + Math.sin(a) * dist;
        const g = ctx.createRadialGradient(x, y, 0, x, y, this.size * 3);
        g.addColorStop(0, `hsla(${this.hue},100%,80%,${this.life * alpha})`);
        g.addColorStop(0.4, `hsla(${this.hue},100%,55%,${this.life * alpha * 0.6})`);
        g.addColorStop(1, `hsla(${this.hue},100%,50%,0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, this.size * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const sparks = [];
    const trailSparks = []; // sparks left behind while drawing

    function spawnSparks(count, r, arcEnd, spread = 0.15) {
      for (let i = 0; i < count; i++) {
        const a = arcEnd + (Math.random() - 0.5) * spread;
        sparks.push(new Spark(a));
        if (Math.random() < 0.4) {
          trailSparks.push(new Spark(a, 0.3));
        }
      }
    }

    // ── Embers flying outward ──────────────────────────────
    class Ember {
      constructor(angle, r) {
        this.x = cx + Math.cos(angle) * r;
        this.y = cy + Math.sin(angle) * r;
        const spd = 40 + Math.random() * 120;
        this.vx = Math.cos(angle) * spd + (Math.random() - 0.5) * 40;
        this.vy = Math.sin(angle) * spd + (Math.random() - 0.5) * 40;
        this.life = 1;
        this.size = Math.random() * 2.5 + 0.5;
        this.hue = 20 + Math.random() * 40;
      }
      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vx *= 1 - dt * 2;
        this.vy *= 1 - dt * 2;
        this.life -= dt * (0.8 + Math.random() * 0.5);
      }
      draw() {
        if (this.life <= 0) return;
        ctx.fillStyle = `hsla(${this.hue},100%,65%,${this.life * 0.9})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const embers = [];

    // ── Inner dimension swirl ──────────────────────────────
    function drawInnerRift(openness, time) {
      if (openness <= 0) return;

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius * openness * 0.92, 0, Math.PI * 2);
      ctx.clip();

      // Deep void gradient
      const voidGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * openness);
      voidGrad.addColorStop(0, '#1a0533');
      voidGrad.addColorStop(0.3, '#0d0820');
      voidGrad.addColorStop(0.7, '#060010');
      voidGrad.addColorStop(1, '#000005');
      ctx.fillStyle = voidGrad;
      ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);

      // Swirling energy bands
      const bands = 5;
      for (let b = 0; b < bands; b++) {
        const rot = time * (0.3 + b * 0.08) * (b % 2 === 0 ? 1 : -1);
        const scale = 0.3 + b * 0.12;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rot);
        ctx.scale(scale * openness, scale * openness * 0.7);

        const g = ctx.createLinearGradient(-radius, 0, radius, 0);
        g.addColorStop(0, 'rgba(255,100,0,0)');
        g.addColorStop(0.3, `rgba(255,${80 + b * 20},0,${0.08 * openness})`);
        g.addColorStop(0.5, `rgba(255,180,50,${0.15 * openness})`);
        g.addColorStop(0.7, `rgba(200,50,255,${0.08 * openness})`);
        g.addColorStop(1, 'rgba(100,0,200,0)');
        ctx.fillStyle = g;
        ctx.fillRect(-radius, -radius * 0.15, radius * 2, radius * 0.3);
        ctx.restore();
      }

      // Distant stars inside the rift
      for (let i = 0; i < 40; i++) {
        const sa = (i * 2.399963) + time * 0.05;
        const sd = (i * 17.3 % 1) * radius * 0.85 * openness;
        const sx = cx + Math.cos(sa) * sd;
        const sy = cy + Math.sin(sa) * sd;
        const ba = 0.3 + 0.5 * Math.sin(time * 2 + i);
        ctx.fillStyle = `rgba(200,180,255,${ba * openness * 0.6})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 0.8 + (i % 3) * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    // ── Draw the spark ring arc ────────────────────────────
    function drawRingArc(arcEnd, thickness, glow, alpha) {
      if (arcEnd <= 0) return;

      const start = -Math.PI / 2;

      // Outer glow
      ctx.save();
      ctx.shadowColor = `rgba(255,120,0,${glow})`;
      ctx.shadowBlur = 30;
      ctx.strokeStyle = `rgba(255,160,30,${alpha * 0.3})`;
      ctx.lineWidth = thickness + 20;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(cx, cy, radius, start, start + arcEnd);
      ctx.stroke();
      ctx.restore();

      // Core ring
      const ringGrad = ctx.createLinearGradient(cx - radius, cy, cx + radius, cy);
      ringGrad.addColorStop(0, `rgba(255,80,0,${alpha})`);
      ringGrad.addColorStop(0.5, `rgba(255,200,50,${alpha})`);
      ringGrad.addColorStop(1, `rgba(255,100,0,${alpha})`);

      ctx.strokeStyle = ringGrad;
      ctx.lineWidth = thickness;
      ctx.lineCap = 'round';
      ctx.shadowColor = `rgba(255,150,0,${alpha * 0.8})`;
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, start, start + arcEnd);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Hot leading edge
      const tipAngle = start + arcEnd;
      const tx = cx + Math.cos(tipAngle) * radius;
      const ty = cy + Math.sin(tipAngle) * radius;
      const tipG = ctx.createRadialGradient(tx, ty, 0, tx, ty, 25);
      tipG.addColorStop(0, `rgba(255,255,200,${alpha})`);
      tipG.addColorStop(0.3, `rgba(255,180,50,${alpha * 0.7})`);
      tipG.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = tipG;
      ctx.beginPath();
      ctx.arc(tx, ty, 25, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── Rotating eldritch symbols ──────────────────────────
    function drawGlyphs(openness, time) {
      if (openness < 0.3) return;

      const count = GLYPHS.length;
      const rot = time * 0.4;
      const alpha = Math.min(1, (openness - 0.3) / 0.7);

      for (let i = 0; i < count; i++) {
        const a = rot + (i / count) * Math.PI * 2;
        const gx = cx + Math.cos(a) * (radius + 28);
        const gy = cy + Math.sin(a) * (radius + 28);
        const pulse = 0.7 + 0.3 * Math.sin(time * 3 + i * 1.7);

        ctx.save();
        ctx.translate(gx, gy);
        ctx.rotate(a + Math.PI / 2);
        ctx.font = `${14 + pulse * 4}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = `rgba(255,150,0,${alpha * pulse})`;
        ctx.shadowBlur = 12;
        ctx.fillStyle = `rgba(255,${180 + pulse * 40},${50 + pulse * 30},${alpha * pulse * 0.85})`;
        ctx.fillText(GLYPHS[i], 0, 0);
        ctx.restore();
      }
    }

    // ── Secondary inner symbol ring ────────────────────────
    function drawInnerGlyphs(openness, time) {
      if (openness < 0.6) return;

      const count = 8;
      const rot = -time * 0.6;
      const alpha = Math.min(1, (openness - 0.6) / 0.4) * 0.5;
      const innerR = radius * 0.75;

      for (let i = 0; i < count; i++) {
        const a = rot + (i / count) * Math.PI * 2;
        const gx = cx + Math.cos(a) * innerR;
        const gy = cy + Math.sin(a) * innerR;

        ctx.save();
        ctx.translate(gx, gy);
        ctx.rotate(a);
        ctx.strokeStyle = `rgba(255,140,40,${alpha})`;
        ctx.lineWidth = 1.2;
        ctx.shadowColor = `rgba(255,100,0,${alpha})`;
        ctx.shadowBlur = 8;
        const s = 6;
        ctx.beginPath();
        ctx.moveTo(-s, 0); ctx.lineTo(0, -s); ctx.lineTo(s, 0); ctx.lineTo(0, s);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }
    }

    // ── Center spark (phase 1) ─────────────────────────────
    function drawCenterSpark(p) {
      const size = 3 + p * 8;
      const alpha = Math.min(1, p * 1.5);

      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 4);
      g.addColorStop(0, `rgba(255,255,220,${alpha})`);
      g.addColorStop(0.2, `rgba(255,180,50,${alpha * 0.8})`);
      g.addColorStop(0.5, `rgba(255,100,0,${alpha * 0.3})`);
      g.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, size * 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── Background ─────────────────────────────────────────
    function drawBackground(time) {
      ctx.fillStyle = '#030008';
      ctx.fillRect(0, 0, W, H);

      // Nebula wisps
      const nebG = ctx.createRadialGradient(cx, cy - 50, 0, cx, cy, radius * 3);
      nebG.addColorStop(0, 'rgba(40,10,60,0.15)');
      nebG.addColorStop(0.5, 'rgba(20,5,40,0.08)');
      nebG.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = nebG;
      ctx.fillRect(0, 0, W, H);

      for (const s of stars) {
        const tw = s.a * (0.6 + 0.4 * Math.sin(time * 1.5 + s.tw));
        ctx.fillStyle = `rgba(200,190,255,${tw})`;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ── Easing ─────────────────────────────────────────────
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

    // ── Main loop ──────────────────────────────────────────
    let lastTime = 0;
    let burstEmbersSpawned = false;

    function frame(now) {
      if (!startTime) startTime = now;
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      const t = elapsed();
      const { phase, p } = phaseProgress(t);
      const time = t;

      drawBackground(time);

      let arcEnd = 0;       // radians of visible arc (0 → 2π)
      let openness = 0;       // inner rift scale 0 → 1
      let ringAlpha = 0;
      let ringThick = 3;
      let glow = 0;

      if (phase === 'spark') {
        drawCenterSpark(p);
        if (p > 0.5 && Math.random() < 0.3) {
          sparks.push(new Spark(-Math.PI / 2));
        }
      }

      if (phase === 'draw') {
        const ep = easeInOutCubic(p);
        arcEnd = ep * Math.PI * 2;
        openness = ep * 0.85;
        ringAlpha = 0.6 + ep * 0.4;
        ringThick = 2 + ep * 4;
        glow = ep * 0.7;

        // Spawn sparks at the leading edge while drawing
        const spawnRate = 3 + ep * 8;
        for (let i = 0; i < spawnRate; i++) {
          sparks.push(new Spark(-Math.PI / 2 + arcEnd + (Math.random() - 0.5) * 0.2));
        }
        if (Math.random() < 0.15) {
          trailSparks.push(new Spark(-Math.PI / 2 + arcEnd));
        }
      }

      if (phase === 'burst') {
        arcEnd = Math.PI * 2;
        openness = 0.85 + easeOutCubic(p) * 0.15;
        ringAlpha = 1;
        ringThick = 6;
        glow = 0.7 + (1 - p) * 0.5;

        if (!burstEmbersSpawned) {
          burstEmbersSpawned = true;
          for (let i = 0; i < 80; i++) {
            const a = (i / 80) * Math.PI * 2;
            embers.push(new Ember(a, radius));
          }
        }
        if (Math.random() < 0.5) {
          spawnSparks(2, radius, Math.random() * Math.PI * 2, Math.PI * 2);
        }
      }

      if (phase === 'stable') {
        arcEnd = Math.PI * 2;
        openness = 1;
        ringAlpha = 0.85 + 0.15 * Math.sin(time * 4);
        ringThick = 5 + Math.sin(time * 3) * 1;
        glow = 0.6 + 0.2 * Math.sin(time * 2.5);

        if (Math.random() < 0.35) {
          spawnSparks(1, radius, Math.random() * Math.PI * 2, Math.PI * 2);
        }
      }

      // Render layers
      drawInnerRift(openness, time);
      drawRingArc(arcEnd, ringThick, glow, ringAlpha);
      drawInnerGlyphs(openness, time);
      drawGlyphs(openness, time);

      // Update & draw sparks
      const sparkAlpha = phase === 'spark' ? p : ringAlpha;
      for (let i = sparks.length - 1; i >= 0; i--) {
        sparks[i].update(dt);
        sparks[i].draw(radius, sparkAlpha);
        if (sparks[i].life <= 0) sparks.splice(i, 1);
      }
      for (let i = trailSparks.length - 1; i >= 0; i--) {
        trailSparks[i].update(dt * 0.5);
        trailSparks[i].draw(radius, sparkAlpha * 0.5);
        if (trailSparks[i].life <= 0) trailSparks.splice(i, 1);
      }

      // Embers
      for (let i = embers.length - 1; i >= 0; i--) {
        embers[i].update(dt);
        embers[i].draw();
        if (embers[i].life <= 0) embers.splice(i, 1);
      }

      // Limit particle count for performance
      while (sparks.length > 300) sparks.shift();
      while (trailSparks.length > 150) trailSparks.shift();
      while (embers.length > 100) embers.shift();

      requestAnimationFrame(frame);
    }

    // Click or tap to replay
    canvas.addEventListener('click', () => {
      startTime = null;
      lastTime = 0;
      burstEmbersSpawned = false;
      sparks.length = 0;
      trailSparks.length = 0;
      embers.length = 0;
    });

    requestAnimationFrame(frame);
  </script>
</body>
</html>
